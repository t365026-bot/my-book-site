<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ghost</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>

    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <h1>ghost</h1>
            <div class="auth-inputs">
                <input type="email" id="auth-email" placeholder="Почта">
                <input type="password" id="auth-pass" placeholder="Пароль">
                <button class="btn-main" id="login-btn">ВОЙТИ</button>
                <button class="btn-sub" id="reg-btn">РЕГИСТРАЦИЯ</button>
                <hr>
                <button class="btn-google" id="google-btn">Войти через Google</button>
            </div>
            <p id="auth-error" style="color: #ff4b4b; font-size: 12px; margin-top: 10px;"></p>
        </div>
    </div>

    <div id="app-screen" class="screen" style="display:none;">
        <div class="sidebar">
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="Поиск по @username">
            </div>
            <div id="chats-list" class="chats"></div>
            <button id="profile-btn" class="set-btn">⚙️ ПРОФИЛЬ</button>
        </div>

        <div class="chat-area">
            <div id="chat-header">Выберите чат</div>
            <div id="messages-box"></div>
            <div class="input-row">
                <textarea id="msg-input" placeholder="Сообщение..." rows="1"></textarea>
                <button id="voice-btn">🎤</button>
                <button id="send-btn">➔</button>
            </div>
        </div>
    </div>

    <div id="profile-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>Настройки</h2>
            <input type="text" id="set-username" placeholder="Придумай @username">
            <button class="btn-main" id="save-profile">СОХРАНИТЬ</button>
            <button class="btn-sub" id="logout-btn">ВЫЙТИ</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
