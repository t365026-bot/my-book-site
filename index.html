<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ghost | messenger</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <h1>ghost</h1>
            <input type="email" id="auth-email" placeholder="Email">
            <input type="password" id="auth-pass" placeholder="Пароль">
            <button class="primary-btn" id="login-btn">ВОЙТИ</button>
            <button class="secondary-btn" id="reg-btn">РЕГИСТРАЦИЯ</button>
            <button class="google-btn" id="google-btn">GOOGLE LOGIN</button>
        </div>
    </div>

    <div id="app-screen" class="screen" style="display:none;">
        <aside id="sidebar">
            <div class="side-header">
                <input type="text" id="user-search" placeholder="Поиск @username...">
            </div>
            <div id="chats-list">
                <div class="chat-item active">Общий чат (Ghost Global)</div>
            </div>
            <div class="side-footer">
                <button id="profile-btn">⚙️ ПРОФИЛЬ</button>
            </div>
        </aside>

        <main id="chat-window">
            <header>
                <div class="chat-title">Ghost Global <small>online</small></div>
            </header>
            <div id="messages-box"></div>
            <div class="input-area">
                <textarea id="msg-input" placeholder="Сообщение..." rows="1"></textarea>
                <button id="voice-btn" title="Удерживай для ГС">🎤</button>
                <button id="send-btn">➔</button>
            </div>
        </main>
    </div>

    <div id="profile-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <h3>Твой профиль</h3>
            <input type="text" id="set-username" placeholder="Придумай @username">
            <button class="primary-btn" id="save-profile">СОХРАНИТЬ</button>
            <button id="logout-btn" style="background:#ff3b30; color:#fff;">ВЫЙТИ</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
