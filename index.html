<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GHOST#CODE | AUTH</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: #0f0f0f;
            --accent: #ff90e8;
            --text: #ffffff;
            --border: 1px solid #222;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .auth-card {
            background: var(--card-bg);
            border: var(--border);
            padding: 40px;
            width: 100%;
            max-width: 350px;
            box-shadow: 15px 15px 0px #000;
            text-align: center;
        }

        h2 { color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: var(--border);
            color: #fff;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent); outline: none; }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            color: #000;
            font-weight: 900;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .btn:hover { background: #fff; }

        /* Скрытая админка */
        #admin-panel {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            padding: 20px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-box { border: var(--border); padding: 20px; background: #111; }
        .stat-box b { color: var(--accent); font-size: 1.5rem; }
        
        .ip-list { margin-top: 20px; font-size: 0.8rem; color: #0f0; text-align: left; }

        .hidden-link { color: #222; text-decoration: none; font-size: 10px; }
    </style>
</head>
<body>

<div class="auth-card" id="auth-form">
    <h2>GHOST#AUTH</h2>
    <p style="font-size: 12px; color: #555;">Введите данные для доступа к системе</p>
    <input type="email" id="email" placeholder="ПОЧТА">
    <input type="password" id="password" placeholder="ПАРОЛЬ">
    <button class="btn" onclick="handleAuth()">ВОЙТИ / РЕГ</button>
    <br><br>
    <a href="#admin" class="hidden-link" onclick="showAdminPrompt()">ADMIN LOGIN</a>
</div>

<div id="admin-panel">
    <h1 style="color: var(--accent);">ADMIN_DASHBOARD v1.0</h1>
    <div class="stats-grid">
        <div class="stat-box">ПОСЕТИТЕЛЕЙ:<br><b id="v-count">1,242</b></div>
        <div class="stat-box">АКТИВНЫЕ СЕССИИ:<br><b>4</b></div>
    </div>
    <div class="ip-list">
        <h3>ПОСЛЕДНИЕ IP ПОДКЛЮЧЕНИЯ:</h3>
        <div id="ip-data">
            [12:44] 192.168.1.45 - SUCCESS<br>
            [12:45] 95.161.22.10 - SUCCESS<br>
            [13:02] 188.225.48.1 - SUCCESS
        </div>
    </div>
    <button class="btn" style="width: auto; padding: 10px 20px;" onclick="location.reload()">ВЫХОД</button>
</div>

<script>
    function handleAuth() {
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;

        // Твои секретные данные
        if (email === "admin@gmail" && pass === "Tim15") {
            document.getElementById('auth-form').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            addLog("Admin login detected.");
        } else {
            alert("Ошибка доступа. Попробуйте снова.");
        }
    }

    function showAdminPrompt() {
        console.log("Admin backdoor path: /admin");
    }

    function addLog(msg) {
        const time = new Date().toLocaleTimeString();
        const logBox = document.getElementById('ip-data');
        logBox.innerHTML = `[${time}] LOG: ${msg}<br>` + logBox.innerHTML;
    }
</script>

</body>
</html>
