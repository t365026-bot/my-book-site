<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ghost</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
</head>
<body>
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <h1>ghost</h1>
            <input type="email" id="email" placeholder="Почта">
            <input type="password" id="pass" placeholder="Пароль">
            <button class="b-main" id="l-btn">ВОЙТИ</button>
            <button class="b-sub" id="r-btn">РЕГИСТРАЦИЯ</button>
            <button class="b-google" id="g-btn">GOOGLE LOGIN</button>
        </div>
    </div>

    <div id="app-screen" class="screen" style="display:none;">
        <div class="side">
            <input type="text" id="search" placeholder="Поиск @username...">
            <div id="chats" class="chat-list">
                <div class="chat-item active" id="global-trigger">Global Chat</div>
            </div>
            <button class="cfg-btn" id="prof-open">⚙️ НАСТРОЙКИ</button>
        </div>
        <div class="main-chat">
            <div class="chat-head" id="chat-name">Ghost Global</div>
            <div id="msgs"></div>
            <div class="input-wrap">
                <textarea id="inp" placeholder="Сообщение..." rows="1"></textarea>
                <button id="v-btn">🎤</button>
                <button id="s-btn">➔</button>
            </div>
        </div>
    </div>

    <div id="modal" class="modal" style="display:none;">
        <div class="m-content">
            <input type="text" id="nick" placeholder="Твой @username">
            <button class="b-main" id="save">СОХРАНИТЬ</button>
            <button class="b-sub" id="exit" style="color:#ff4b4b">ВЫЙТИ</button>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
